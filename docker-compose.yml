version: '3.9'

services:

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  app:
    build: ./app
    container_name: app
    ports:
      - "5000:5000"

  analyzer-worker:
    build: ./agent
    command: python workers/analyzer_worker.py
    env_file:
      - .env
    depends_on:
      - redis

  planner-worker:
    build: ./agent
    command: python workers/planner_worker.py
    env_file:
      - .env
    depends_on:
      - redis

  executor-worker:
    build: ./agent
    command: python workers/executor_worker.py
    env_file:
      - .env
    depends_on:
      - redis

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"

  fluent-bit:
    image: grafana/fluent-bit-plugin-loki:latest
    container_name: fluent-bit
    volumes:
      - ./infra/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf
      - /var/lib/docker/containers:/var/lib/docker/containers:ro