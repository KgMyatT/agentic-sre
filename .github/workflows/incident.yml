name: Incident Response

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  respond:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt
      - run: bash scripts/collect_logs.sh
      - run: python agent/analyzer.py
      - run: python agent/planner.py
      - run: python agent/executor.py
